name: Build and release

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE*'
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force create release even if tag exists'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write

jobs:
  detect-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      should-release: ${{ steps.check-release.outputs.should-release }}
      tag-exists: ${{ steps.check-tag.outputs.exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from csproj
        id: get-version
        run: |
          VERSION=$(grep -oP '<Version>\K[^<]+' JustBackup/JustBackup.csproj | head -1)
          if [ -z "$VERSION" ]; then
            echo "Error: Could not extract version from csproj"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Check if tag already exists
        id: check-tag
        run: |
          TAG="v${{ steps.get-version.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG$"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Determine if release should be created
        id: check-release
        run: |
          FORCE_RELEASE="${{ github.event.inputs.force_release }}"
          TAG_EXISTS="${{ steps.check-tag.outputs.exists }}"
          if [ "$FORCE_RELEASE" = "true" ] || [ "$TAG_EXISTS" = "false" ]; then
            echo "should-release=true" >> $GITHUB_OUTPUT
          else
            echo "should-release=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: detect-version
    if: needs.detect-version.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.detect-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore NuGet packages
        run: dotnet restore JustBackup/JustBackup.csproj

      - name: Download and setup Dalamud
        run: |
          wget -q https://goatcorp.github.io/dalamud-distrib/stg/latest.zip -O dalamud.zip
          unzip -q dalamud.zip -d .dalamud
          echo "DALAMUD_HOME=$PWD/.dalamud/" >> $GITHUB_ENV

      - name: Build
        run: |
          dotnet build JustBackup/JustBackup.csproj \
            -c Release \
            -p:TargetFramework=net10.0-windows7.0 \
            -p:DALAMUD_HOME=$DALAMUD_HOME

      - name: Package plugin
        run: |
          mkdir -p release
          cd JustBackup/bin/Release
          zip -r $OLDPWD/release/JustBackup.zip . -x "*.pdb"
          cd $OLDPWD
          cp JustBackup/JustBackup.json release/
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          for file in *; do
            if [ -f "$file" ]; then
              sha256sum "$file" > "$file.sha256"
            fi
          done

      - name: Create and push tag
        run: |
          TAG="v${VERSION}"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ "${{ needs.detect-version.outputs.tag-exists }}" = "true" ]; then
            git tag -d $TAG || true
            git push origin :refs/tags/$TAG || true
          fi
          git tag $TAG -m "Release version ${VERSION}"
          git push origin $TAG

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: "JustBackup v${{ env.VERSION }}"
          body: |
            ## JustBackup v${{ env.VERSION }}

            Automated release.
          files: |
            release/*
          draft: false
          prerelease: false
