JustBackup configuration==JustBackup 设置
Read how to restore a backup==阅读如何恢复备份
Custom backup path (by default: %localappdata%\JustBackup):==自定义备份路径（默认：%localappdata%\JustBackup）：
Custom temporary files path (by default: %temp%):==自定义临时文件路径（默认：%temp%）：
Automatically remove old backups==自动删除旧备份
Delete backups older than, days==删除早于多少天的旧备份
Delete to recycle bin, if available.=如可用则移至回收站
Always keep at least this number of backup regardless of their date==无论日期如何，至少保留此数量的备份
Include plugin configurations==包含插件配置
Include ALL files inside FFXIV's data folder into backup==备份 FFXIV 数据文件夹中的所有文件
