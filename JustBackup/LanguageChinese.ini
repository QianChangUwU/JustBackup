7-zip archives are taking up to 15 times less space!=7-zip 压缩包体积最多可小 15 倍！
Do not restrict amount of resources 7-zip can use==不限制 7-zip 可使用的资源
Minimal interval between backups, minutes==备份最小间隔（分钟）
Backup will not be created if previous backup was created less than this amount of minutes. Note that only successfully completed backups will update interval.==如果上次备份未达到此间隔时间，则不会创建新备份。注意只有成功完成的备份才会更新间隔时间。
